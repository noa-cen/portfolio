<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="description" content="Portfolio de Noa Cengarle">
        <meta name="author" content="Noa Cengarle">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="portfolio.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" 
        rel="stylesheet">
        
        <link rel="icon" type="image/x-icon" href="./Images/favicon.ico">
        <title>Noa Cengarle - portfolio</title>

    <body>
        <header>
            <img src="./Images/NC.png" alt="logo de N.C" class="nc">
            <nav class="navbar">
                <ul class="nav-link">
                    <li><a href="#profil">Mon profil</a></li>
                    <li><a href="#competences">Compétences</a></li>
                    <li><a href="#parcours">Mon parcours</a></li>

        <main>
            <section class="presentation">
                <article class="texte">

    <script>
        const menuHamburger = document.querySelector("#menu-hamburger")
        const navLinks = document.querySelector(".nav-link")

        menuHamburger.addEventListener('click',()=>{
        navLinks.classList.toggle('mobile-menu')
        })
    </script>
